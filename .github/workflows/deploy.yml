name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Configure analysis env for production build
        run: |
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "VITE_GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> "$GITHUB_ENV"
          elif [ -n "${{ secrets.GOOGLE_API_KEY }}" ]; then
            echo "VITE_GEMINI_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.ANALYSIS_COMMIT_PAT }}" ]; then
            echo "VITE_GITHUB_COMMIT_PAT=${{ secrets.ANALYSIS_COMMIT_PAT }}" >> "$GITHUB_ENV"
          fi

      - run: npm run build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

name: Analyze CSV Data

on:
  workflow_dispatch:
    inputs:
      csv_filename:
        description: Optional CSV filename to analyze (blank = all files)
        required: false
        type: string
  push:
    paths:
      - 'raw_data/**'

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run AI analysis
        env:
          CSV_FILENAME: ${{ github.event.inputs.csv_filename || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: gemini-3.1-flash
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: python scripts/analyze_csv.py

      - name: Commit analysis memory
        run: |
          if git diff --quiet analysis/memory.md; then
            echo "No analysis changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add analysis/memory.md
          git commit -m "Update AI analysis memory"
          git push

name: Analyze CSV Data

on:
  workflow_dispatch:
    inputs:
      csv_filename:
        description: Optional CSV filename to analyze (blank = new files only)
        required: false
        type: string
      reanalyze_all:
        description: Re-analyze every CSV (including files already in memory)
        required: false
        type: boolean
        default: false
  workflow_run:
    workflows: ["CSV Manager Bot"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: analyze-csv-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run AI analysis
        env:
          CSV_FILENAME: ${{ github.event.inputs.csv_filename || '' }}
          REANALYZE_ALL: ${{ github.event.inputs.reanalyze_all || 'false' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: gemini-3.1-flash-lite
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: python scripts/analyze_csv.py

      - name: Commit analysis memory
        run: |
          if git diff --quiet analysis/memory.md; then
            echo "No analysis changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add analysis/memory.md
          git commit -m "Update AI analysis memory"
          git pull --rebase origin main
          git push
